<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秘境穿梭</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <h1>秘境穿梭</h1>
      <p class="subtitle">选择角色：按 1/2 或点击角色卡；游戏内可点击Q回到选择人物界面。</p>
      <canvas id="game" width="960" height="540" aria-label="秘境穿梭者横屏游戏画面"></canvas>
      <div class="tips">
        <p><strong>操作：</strong>使用空格、↑、W 或点击飞行，躲避场内所有障碍物。</p>
        <p><strong>目标：</strong>不必考虑尽头的旅行，观察每一波障碍的横向节奏，尽可能行进的更远。</p>
      </div>
    </main>
    <script src="characters_data.js"></script>
    <script src="game.js"></script>
  </body>
</html>
